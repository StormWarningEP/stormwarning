<!DOCTYPE html>
<html>
<head>
  <title>VOID</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: monospace;
    }

    .bg {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, red, black, blue, black);
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.5); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      text-align: center;
      animation: flicker 0.1s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="text">
    YOU ARE HERE<br>
    DO NOT LOOK AWAY<br>
    SYSTEM BREACHING...
  </div>

  <script>
    setInterval(() => {
      document.body.style.filter =
        `hue-rotate(${Math.random() * 360}deg) contrast(200%)`;
    }, 200);
  </script>
</body>
</html>
